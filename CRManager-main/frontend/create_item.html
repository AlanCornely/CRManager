<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRManager - Novo Item</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <a href="index.html" class="logo">
            <span>📦</span> CRManager
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">📊 Dashboard</a></li>
            <li><a href="inventory.html" class="nav-link">📦 Estoque</a></li>
            <li><a href="create_item.html" class="nav-link active">➕ Novo Item</a></li>
            <li><a href="#" class="nav-link">👥 Clientes</a></li>
            <li><a href="#" class="nav-link">⚙️ Configurações</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <h1>Adicionar Novo Item</h1>
        </header>

        <div class="card" style="max-width: 800px;">
            <form action="#">
                <div class="form-group">
                    <label class="form-label">Nome do Item</label>
                    <input type="text" class="form-input" placeholder="Ex: Monitor Dell 24..." required>
                </div>

                <div class="form-group">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-textarea" placeholder="Detalhes do produto..."></textarea>
                </div>

                <div class="form-group">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label class="form-label">Quantidade Inicial</label>
                            <input type="number" class="form-input" min="0" placeholder="0" required>
                        </div>
                        <div>
                            <label class="form-label">Preço Unitário (R$)</label>
                            <input type="number" class="form-input" step="0.01" placeholder="0.00">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Tags (Categorias)</label>
                    <div class="tag-list" style="margin-bottom: 0.5rem;">
                        <span class="tag">Eletrônicos</span>
                        <span class="tag">Periféricos</span>
                        <span class="tag">Escritório</span>
                        <span class="tag" style="background: transparent; border: 1px dashed #cbd5e1; color: #64748b;">+
                            Adicionar Tag</span>
                    </div>
                    <small style="color: var(--text-secondary);">Selecione tags existentes ou crie novas.</small>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">Salvar Item</button>
                    <a href="inventory.html" class="btn" style="color: var(--text-secondary);">Cancelar</a>
                </div>
            </form>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
